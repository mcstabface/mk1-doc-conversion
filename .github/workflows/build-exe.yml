name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile main.py --name mk1-doc-conversion

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mk1-doc-conversion-exe
          path: dist/mk1-doc-conversion.exe